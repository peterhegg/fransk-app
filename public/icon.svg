<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#091526"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <linearGradient id="c-tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5a9af0"/>
      <stop offset="100%" stop-color="#1a4fbf"/>
    </linearGradient>
    <linearGradient id="c-city" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1c30"/>
      <stop offset="100%" stop-color="#0a1626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="url(#c-bg)"/>

  <!-- Art Deco border frames -->
  <rect x="7" y="7" width="106" height="106" rx="4" fill="none" stroke="rgba(46,107,230,0.32)" stroke-width="0.8"/>
  <rect x="10" y="10" width="100" height="100" rx="3" fill="none" stroke="rgba(46,107,230,0.14)" stroke-width="0.5"/>

  <!-- Tricolor top -->
  <rect x="13" y="13" width="30" height="1.5" fill="#2e6be6" opacity="0.9"/>
  <rect x="45" y="13" width="30" height="1.5" fill="rgba(220,228,245,0.6)"/>
  <rect x="77" y="13" width="30" height="1.5" fill="#b83030" opacity="0.85"/>

  <!-- City LEFT — Mansard roofs -->
  <path d="M13,102 L13,82 L16.5,76 L20,82 L20,76 L24,70 L28,76 L28,80 L31,74 L34,80 L34,83 L36,78 L38,83 L38,102 Z" fill="#0d1c30"/>
  <rect x="15"   y="72" width="2"   height="5"   fill="#060e1c"/>
  <rect x="22.5" y="66" width="2"   height="5"   fill="#060e1c"/>
  <rect x="30"   y="70" width="2"   height="5"   fill="#060e1c"/>
  <rect x="35.5" y="74" width="1.5" height="4.5" fill="#060e1c"/>
  <rect x="14"   y="84" width="3" height="2" fill="rgba(46,107,230,0.22)"/>
  <rect x="14"   y="88" width="3" height="2" fill="rgba(46,107,230,0.16)"/>
  <rect x="21.5" y="79" width="3" height="2" fill="rgba(46,107,230,0.28)"/>
  <rect x="21.5" y="83" width="3" height="2" fill="rgba(46,107,230,0.2)"/>
  <rect x="25.5" y="83" width="3" height="2" fill="rgba(46,107,230,0.18)"/>
  <rect x="29"   y="82" width="2.5" height="2" fill="rgba(46,107,230,0.2)"/>
  <rect x="29"   y="86" width="2.5" height="2" fill="rgba(46,107,230,0.15)"/>

  <!-- City RIGHT — Mansard roofs -->
  <path d="M82,102 L82,83 L84,78 L86,83 L86,80 L89,74 L92,80 L92,76 L96,70 L100,76 L100,82 L103.5,76 L107,82 L107,102 Z" fill="#0d1c30"/>
  <rect x="83"   y="74" width="1.5" height="4.5" fill="#060e1c"/>
  <rect x="88"   y="70" width="2"   height="5"   fill="#060e1c"/>
  <rect x="95.5" y="66" width="2"   height="5"   fill="#060e1c"/>
  <rect x="103"  y="72" width="2"   height="5"   fill="#060e1c"/>
  <rect x="88.5" y="82" width="2.5" height="2" fill="rgba(46,107,230,0.2)"/>
  <rect x="88.5" y="86" width="2.5" height="2" fill="rgba(46,107,230,0.15)"/>
  <rect x="91.5" y="83" width="3"   height="2" fill="rgba(46,107,230,0.18)"/>
  <rect x="93"   y="79" width="3"   height="2" fill="rgba(46,107,230,0.2)"/>
  <rect x="97"   y="83" width="3"   height="2" fill="rgba(46,107,230,0.28)"/>
  <rect x="103"  y="84" width="3"   height="2" fill="rgba(46,107,230,0.22)"/>
  <rect x="103"  y="88" width="3"   height="2" fill="rgba(46,107,230,0.16)"/>

  <!-- Ground line accent -->
  <line x1="13" y1="101" x2="107" y2="101" stroke="rgba(46,107,230,0.22)" stroke-width="0.7"/>

  <!-- Center background buildings (between tower legs) -->
  <path d="M44,102 L44,81 L48,75 L52,81 L52,102 Z"  fill="#0d1c30"/>
  <path d="M52,102 L52,77 L60,69 L68,77 L68,102 Z"  fill="#0f1e32"/>
  <path d="M68,102 L68,81 L72,75 L76,81 L76,102 Z"  fill="#0d1c30"/>
  <rect x="47"   y="71" width="2" height="5" fill="#0a1526"/>
  <rect x="59"   y="65" width="2" height="5" fill="#0a1526"/>
  <rect x="71"   y="71" width="2" height="5" fill="#0a1526"/>
  <rect x="47.5" y="83" width="2.5" height="2" fill="rgba(46,107,230,0.28)"/>
  <rect x="56"   y="80" width="3"   height="2" fill="rgba(46,107,230,0.32)"/>
  <rect x="61"   y="80" width="3"   height="2" fill="rgba(46,107,230,0.28)"/>
  <rect x="56"   y="84" width="3"   height="2" fill="rgba(46,107,230,0.2)"/>
  <rect x="61"   y="84" width="3"   height="2" fill="rgba(46,107,230,0.18)"/>
  <rect x="70"   y="83" width="2.5" height="2" fill="rgba(46,107,230,0.28)"/>

  <!-- EIFFEL TOWER (bold French blue) -->
  <path d="M38,90 L50,65 L53,65 L44,90 Z" fill="url(#c-tower)"/>
  <path d="M82,90 L70,65 L67,65 L76,90 Z" fill="url(#c-tower)"/>
  <rect x="40" y="80" width="40" height="2" fill="url(#c-tower)" opacity="0.7"/>
  <rect x="47" y="63" width="26" height="4" rx="1" fill="url(#c-tower)"/>
  <rect x="47" y="63" width="26" height="0.9" rx="0.4" fill="rgba(255,255,255,0.2)"/>
  <path d="M51,63 L54,48 L66,48 L69,63 Z" fill="url(#c-tower)"/>
  <rect x="54" y="56" width="12" height="1.5" fill="rgba(255,255,255,0.18)"/>
  <rect x="52" y="46" width="16" height="3.5" rx="0.8" fill="url(#c-tower)"/>
  <rect x="52" y="46" width="16" height="0.8" rx="0.4" fill="rgba(255,255,255,0.2)"/>
  <path d="M54,46 L57.5,32 L62.5,32 L66,46 Z" fill="url(#c-tower)"/>
  <polygon points="60,17 57.5,32 62.5,32" fill="url(#c-tower)"/>
  <path d="M51,63 L54,48 L57.5,32 L60,17" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>

  <!-- Tricolor bottom -->
  <rect x="13" y="105" width="30" height="1.5" fill="#2e6be6" opacity="0.9"/>
  <rect x="45" y="105" width="30" height="1.5" fill="rgba(220,228,245,0.6)"/>
  <rect x="77" y="105" width="30" height="1.5" fill="#b83030" opacity="0.85"/>

  <!-- Text -->
  <text x="60" y="114" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="7" fill="rgba(232,237,245,0.72)"
    letter-spacing="2.5" font-weight="700">L'ATELIER</text>
</svg>
